stages:
  - lint
  - build
  - release

variables:
  GO_VERSION: "1.24"
  BINARY_NAME: "birthday"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}"

default:
  image: golang:${GO_VERSION}
  before_script:
    - go version
    - go env GOPATH

# ─── lint ──────────────────────────────────────────────────────────────────────

lint:
  stage: lint
  script:
    - go vet ./...
    - |
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
        | sh -s -- -b $(go env GOPATH)/bin v1.62.0
    - golangci-lint run --timeout=5m
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ─── build ─────────────────────────────────────────────────────────────────────

.build_template: &build_template
  stage: build
  script:
    - |
      GOOS=${TARGET_OS} GOARCH=${TARGET_ARCH} \
        go build -ldflags="-s -w \
          -X main.Version=${CI_COMMIT_TAG:-dev} \
          -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
          -X main.Commit=${CI_COMMIT_SHORT_SHA}" \
        -o ${BINARY_NAME}_${TARGET_OS}_${TARGET_ARCH}${BINARY_EXT} .
  artifacts:
    paths:
      - ${BINARY_NAME}_${TARGET_OS}_${TARGET_ARCH}${BINARY_EXT}
    expire_in: 1 week

build:linux:amd64:
  <<: *build_template
  variables:
    TARGET_OS: linux
    TARGET_ARCH: amd64
    BINARY_EXT: ""

build:linux:arm64:
  <<: *build_template
  variables:
    TARGET_OS: linux
    TARGET_ARCH: arm64
    BINARY_EXT: ""

build:darwin:amd64:
  <<: *build_template
  variables:
    TARGET_OS: darwin
    TARGET_ARCH: amd64
    BINARY_EXT: ""

build:darwin:arm64:
  <<: *build_template
  variables:
    TARGET_OS: darwin
    TARGET_ARCH: arm64
    BINARY_EXT: ""

build:windows:amd64:
  <<: *build_template
  variables:
    TARGET_OS: windows
    TARGET_ARCH: amd64
    BINARY_EXT: ".exe"

# ─── release ───────────────────────────────────────────────────────────────────

upload:
  stage: release
  image: curlimages/curl:latest
  before_script: []
  dependencies:
    - build:linux:amd64
    - build:linux:arm64
    - build:darwin:amd64
    - build:darwin:arm64
    - build:windows:amd64
  script:
    - |
      for f in birthday_linux_amd64 birthday_linux_arm64 birthday_darwin_amd64 birthday_darwin_arm64 birthday_windows_amd64.exe; do
        echo "Uploading $f..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$f" \
             "${PACKAGE_REGISTRY_URL}/$f"
      done
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  needs:
    - job: upload
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    name: "🎂 ${CI_COMMIT_TAG} — С днём рождения, Миша!"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      ## 🎉 Happy Birthday, Михаил Коньков!

      Техлид, Go-разработчик, DevOps-маг в оранжевых очках.

      ### Скачать

      | Платформа    | Архитектура | Файл |
      |---|---|---|
      | Linux        | amd64       | [birthday_linux_amd64](${PACKAGE_REGISTRY_URL}/birthday_linux_amd64) |
      | Linux        | arm64       | [birthday_linux_arm64](${PACKAGE_REGISTRY_URL}/birthday_linux_arm64) |
      | macOS        | amd64       | [birthday_darwin_amd64](${PACKAGE_REGISTRY_URL}/birthday_darwin_amd64) |
      | macOS        | arm64 (M1+) | [birthday_darwin_arm64](${PACKAGE_REGISTRY_URL}/birthday_darwin_arm64) |
      | Windows      | amd64       | [birthday_windows_amd64.exe](${PACKAGE_REGISTRY_URL}/birthday_windows_amd64.exe) |

      ### Запуск

      ```bash
      # Linux / macOS
      chmod +x birthday_linux_amd64
      ./birthday_linux_amd64

      # Windows
      .\birthday_windows_amd64.exe
      ```

      > Прокрутка: ↑/↓ · Выход: q
    assets:
      links:
        - name: "Linux amd64"
          url: "${PACKAGE_REGISTRY_URL}/birthday_linux_amd64"
          link_type: package
        - name: "Linux arm64"
          url: "${PACKAGE_REGISTRY_URL}/birthday_linux_arm64"
          link_type: package
        - name: "macOS amd64"
          url: "${PACKAGE_REGISTRY_URL}/birthday_darwin_amd64"
          link_type: package
        - name: "macOS arm64 (M1+)"
          url: "${PACKAGE_REGISTRY_URL}/birthday_darwin_arm64"
          link_type: package
        - name: "Windows amd64"
          url: "${PACKAGE_REGISTRY_URL}/birthday_windows_amd64.exe"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
